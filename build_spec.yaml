version: 0.1 
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib64/graalvm/graalvm-java22

  exportedVariables:
    - BuildServiceDemoVersion
    - IMAGE_VERSION

steps:
  - type: Command
    name: "Install GraalVM Enterprise 22.x Native Image for Java22"
    command:  yum -y install graalvm-22-jdk.x86_64;
              ls /usr/lib64/graalvm/

  - type: Command
    name: "Set PATH Variable"
    command: export PATH=$JAVA_HOME/bin:$PATH

  - type: Command
    name: "Docker Login"
    command:  cd MtdrSpring;
              oci os object get --bucket-name reacttodo-evley --name deployment_config.tgz --file deployment_config.tgz;
              tar -xzvf deployment_config.tgz;
              source env.sh;
              cat at.cfg | docker login -u "axoynx02qynb/a01645013@tec.mx" --password-stdin qro.ocir.io

  - type: Command
    name: "Generate Image Version"
    command: |
      export IMAGE_VERSION=$(date +%s)
      echo "Generated IMAGE_VERSION=$IMAGE_VERSION"

  - type: Command
    name: "Build"
    command:  cd MtdrSpring;
              source env.sh;
              (cd backend;source build.sh)
                
  - type: Command
    name: "Install K8s"
    command: mkdir -p $HOME/.kube;
            cd $HOME;
            ls -la;
            mkdir k8s;
            ls -la;
            cd k8s;
            wget https://dl.k8s.io/v1.31.2/bin/linux/amd64/kubectl;
            ls -la;
            chmod +x kubectl;
            export PATH=$PATH:$HOME/k8s;
            kubectl version --client;
            cd ..;
            cd .kube;
      
            oci ce cluster create-kubeconfig --cluster-id ocid1.cluster.oc1.mx-queretaro-1.aaaaaaaa3jzgj54xiwcg7khdyxxyj5vcxrmyia3e3w7ucd6ehcpkhrn4waea --file $HOME/.kube/config --region mx-queretaro-1 --token-version 2.0.0  --kube-endpoint PUBLIC_ENDPOINT
            
            export KUBECONFIG=$HOME/.kube/config;

 #this is a test comment pls work
  #anotha one
  - type: Command
    name: "Undeploy"
    ignoreFailure: True
    command: export PATH=$PATH:$HOME/k8s;kubectl version;
        export KUBECONFIG=$HOME/.kube/config;
        cd MtdrSpring;
        source env.sh;
        cd backend;
        ls -l;
        kubectl config view;
        source undeploy.sh;












